<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag Scroll</title>
  <style>
    /* (PASTE THE CSS ABOVE HERE) */
  </style>
</head>
<body>

<div class="items">
  <div class="item">01</div>
  <div class="item">02</div>
  <div class="item">03</div>
  <div class="item">04</div>
  <div class="item">05</div>
  <div class="item">06</div>
  <div class="item">07</div>
  <div class="item">08</div>
  <div class="item">09</div>
  <div class="item">10</div>
  <div class="item">11</div>
  <div class="item">12</div>
  <div class="item">13</div>
  <div class="item">14</div>
  <div class="item">15</div>
  <div class="item">16</div>
  <div class="item">17</div>
  <div class="item">18</div>
  <div class="item">19</div>
  <div class="item">20</div>
  <div class="item">21</div>
  <div class="item">22</div>
  <div class="item">23</div>
  <div class="item">24</div>
  <div class="item">25</div>
</div>

<script>
const slider = document.querySelector('.items');

let isDown = false;
let startX = 0;
let scrollLeft = 0;

function startDrag(e) {
  isDown = true;
  slider.classList.add('active');

  startX = (e.pageX || e.touches?.[0].pageX) - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
}

function stopDrag() {
  isDown = false;
  slider.classList.remove('active');
}

function moveDrag(e) {
  if (!isDown) return;

  e.preventDefault();

  const x = (e.pageX || (e.touches ? e.touches[0].pageX : 0)) - slider.offsetLeft;
  const walk = (x - startX) * 2;

  slider.scrollLeft = scrollLeft - walk;
}

// Mouse events
slider.addEventListener('mousedown', startDrag);
slider.addEventListener('mouseleave', stopDrag);
slider.addEventListener('mouseup', stopDrag);
slider.addEventListener('mousemove', moveDrag);

// IMPORTANT: document-level handlers (fix Cypress issue)
document.addEventListener('mouseup', stopDrag);
document.addEventListener('mousemove', moveDrag);

// Touch support (safe, optional but good)
slider.addEventListener('touchstart', startDrag);
slider.addEventListener('touchend', stopDrag);
slider.addEventListener('touchmove', moveDrag);
</script>

</body>
</html>
