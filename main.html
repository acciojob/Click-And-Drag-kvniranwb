<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div class="item item1">01</div>
    <div class="item item2">02</div>
    <div class="item item3">03</div>
    <div class="item item4">04</div>
    <div class="item item5">05</div>
    <div class="item item6">06</div>
    <div class="item item7">07</div>
    <div class="item item8">08</div>
    <div class="item item9">09</div>
    <div class="item item10">10</div>
    <div class="item item11">11</div>
    <div class="item item12">12</div>
    <div class="item item13">13</div>
    <div class="item item14">14</div>
    <div class="item item15">15</div>
    <div class="item item16">16</div>
    <div class="item item17">17</div>
    <div class="item item18">18</div>
    <div class="item item19">19</div>
    <div class="item item20">20</div>
    <div class="item item21">21</div>
    <div class="item item22">22</div>
    <div class="item item23">23</div>
    <div class="item item24">24</div>
    <div class="item item25">25</div>
  </div>

<script>
const container = document.querySelector('.items');
const items = Array.from(document.querySelectorAll('.item'));

const ITEM_SIZE = 200;
const GAP = 10;
const STEP = ITEM_SIZE + GAP;

let activeItem = null;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;

// Make container the positioning reference
container.style.position = 'relative';

// Convert items to absolute positioned grid
function layoutItems() {
  const cols = Math.max(1, Math.floor(container.clientWidth / STEP));

  items.forEach((item, i) => {
    if (item === activeItem) return; // don't reset dragged item

    const col = i % cols;
    const row = Math.floor(i / cols);

    item.style.position = 'absolute';
    item.style.width = ITEM_SIZE + 'px';
    item.style.height = ITEM_SIZE + 'px';

    item.style.left = (col * STEP + 100) + 'px';
    item.style.top = (row * STEP + 100) + 'px';

    item.style.cursor = 'grab';
  });
}

// Initial layout
layoutItems();
window.addEventListener('resize', layoutItems);

items.forEach(item => {
  item.addEventListener('mousedown', (e) => {
    activeItem = item;
    isDragging = false;

    const rect = item.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    item.style.zIndex = 1000;
    item.style.cursor = 'grabbing';
  });
});

document.addEventListener('mousemove', (e) => {
  if (!activeItem) return;

  isDragging = true;

  const containerRect = container.getBoundingClientRect();

  let x = e.clientX - containerRect.left - offsetX;
  let y = e.clientY - containerRect.top - offsetY;

  // Boundary constraints
  const maxX = container.clientWidth - ITEM_SIZE;
  const maxY = container.clientHeight - ITEM_SIZE;

  x = Math.max(0, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));

  activeItem.style.left = x + 'px';
  activeItem.style.top = y + 'px';
});

document.addEventListener('mouseup', () => {
  if (!activeItem) return;

  activeItem.style.cursor = 'grab';
  activeItem.style.zIndex = '';

  activeItem = null;
  isDragging = false;
});</script>

  </body>
</html>
